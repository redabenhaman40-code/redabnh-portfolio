<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Chat</title>
<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
.chat {
  width: 350px;
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
}
.messages {
  height: 300px;
  overflow-y: auto;
}
.user { color: #38bdf8; text-align: right; }
.bot { color: #22c55e; text-align: left; }
</style>
</head>
<body>

<div class="chat">
  <div class="messages" id="msgs"></div>
  <input id="input" placeholder="Write..." />
  <button onclick="send()">Send</button>
</div>

<script>
function fakeAI(text) {
  text = text.toLowerCase();

  if (text.includes("hello")) return "Hi there 👋";
  if (text.includes("portfolio")) return "This is my portfolio website 🚀";
  if (text.includes("who are you")) return "I'm a simple AI demo 🤖";

  return "I don't understand 😅";
}

function send() {
  const input = document.getElementById("input");
  const msgs = document.getElementById("msgs");

  const userText = input.value;
  if (!userText) return;

  msgs.innerHTML += `<div class="user">${userText}</div>`;

  const reply = fakeAI(userText);

  setTimeout(() => {
    msgs.innerHTML += `<div class="bot">${reply}</div>`;
    msgs.scrollTop = msgs.scrollHeight;
  }, 500);

  input.value = "";
}
</script>

</body>
</html>
